<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>windowsの警告
    </title>
    <style>
        body{
            padding: 10px 10px;
            background-color: red;
        }
        h1{
            color: black;
        }
        .shikaku{
            width: 800px;
            height: 200px;
            background-color: white;
            color: rgb(123, 82, 255);
            animation: expansion 3s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: absolute;
        }
        @keyframes expansion{
            0%{transform: scale(1);}
            50%{transform: scale(1.2);}
            
        }
    </style>
</head>
<body>
    <div class="shikaku" id="shikaku"></div>
    <script>
        const shi = document.getElementById("shikaku")
        shi.innerText = "お使いのデバイスはウイルスに感染しました"
        shi.style.left = "20%"
        shi.style.top = "20%"
    </script>
</body>
</html>
