<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>windowsの警告</title>
    <style>
        body{
            padding: 10px 10px;
            background-color: red;
            width: 100vw;
            height: 1200px;
            transition: background-color 0.3s;
        }
        h1{
            color: black;
            font-size: 50px;
        }
        .shikaku{
            width: 60vw;
            height: 200px;
            background-color: white;
            color: rgb(123, 82, 255);
            animation: expansion 1.5s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            transform: translate(-50%,-50%);
            cursor: pointer;
        }
        .shikaku2{
            width: 80vw;
            height: 200px;
            background-color: rgb(176, 93, 93);
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        @keyframes expansion{
            0%{transform: scale(1);}
            50%{transform: scale(1.4);}
            100%{transform: scale(1);}
        }
    </style>
</head>
<body>
    <div class="shikaku" id="shikaku"></div>
    <div class="shikaku2" id="shikaku2"></div>
    <div id="area"></div>
    <script>
        const shi = document.getElementById("shikaku")
        const area = document.getElementById("area")
        shi.innerText = "お使いのデバイスはウイルスに感染しました対処方法をクリックして確認してください"
        shi.style.left = "50%"
        shi.style.top = "50%"
        const shi2 = document.getElementById("shikaku2")
        shi2.style.display = "none"

        // shikakuを押したときの挙動

        shi.onclick = ()=>{
            alert("今すぐシャットダウンをしてください")
            shi.style.display ="none"
            const body = document.body
            setTimeout(() => {
                area.innerHTML = "ファイルが消されています"
                area.innerHTML += "個人情報が抜き取られています"
                area.innerHTML += "下の方の対処方法のところをクリックしてください"
            }, 3000);
        }
            // shikaku2の挙動

            shi2.innerText = "対処方法"
            shi2.style.display = "block"
            shi2.style.bottom = "-400px"
            shi2.style.left = "25%"
            shi2.onclick = ()=>{
                shi2.innerText = "請求額は100万円です。支払い方法は銀行振込のみです。"
                area.appendChild(shi2)
            }   
        }
    </script>
</body>
</html>
