<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>windowsの警告
    </title>
    <style>
        body{
            padding: 10px 10px;
            background-color: red;
        }
        h1{
            color: black;
        }
        .shikaku{
            width: 800px;
            height: 200px;
            background-color: white;
            color: rgb(123, 82, 255);
            animation: expansion 1s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: absolute;
            cursor: pointer;
        }
        @keyframes expansion{
            0%{transform: scale(1);}
            50%{transform: scale(1.4);}
            
        }
    </style>
</head>
<body>
    <div class="shikaku" id="shikaku"></div>
    <div id="area"></div>
    <script>
        const shi = document.getElementById("shikaku")
        const area = document.getElementById("area")
        shi.innerText = `お使いのデバイスはウイルスに感染しました
            対処方法をクリックして確認してください
            `
        shi.style.left = "20%"
        shi.style.top = "20%"
        shi.onclick = ()=>{
            alert("今すぐシャットダウンをしてください")
            area.innerHTML = "<h1>ファイルが消されています。急いでください(噓)</h1>"
            shi.style.display ="none"
            setTimeout(() => {
                area.innerHTML += "<h1>個人情報が漏洩しています</h1>"
                area.innerHTML += "<h1>ウイルスが拡散しています</h1>"
                area.innerHTML += "<h1>デバイスが破壊されました！お疲れ様でした☻</h1>"
                }, 2000);
            const body = document.body
            const colors = ["green","yellow","pink"]
            let index = 0
            setInterval(() => {
                body.style.backgroundColor = colors[index]
                index = (index + 1) % colors.length;
            }, 593);
            
        }
    </script>
</body>
</html>
