<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>windowsの警告</title>
    <style>
        body{
            padding: 10px 10px;
            background-color: red;
            width: 500px;
            height: 1200px;
            transition: background-color 3s;
        }
        h1{
            color: black;
            font-size: 50px;
        }
        .shikaku{
            width: 60vw;
            height: 200px;
            background-color: white;
            color: rgb(123, 82, 255);
            animation: expansion 1.5s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: absolute;
            top: 300px;
            right: 20vw;
            cursor: pointer;
        }
        .shikaku2{
            width: 80vw;
            height: 200px;
            background-color: rgb(176, 93, 93);
            position: absolute;
            top: 1000px;
            right: 5vw;
            display: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        @keyframes expansion{
            0%{transform: scale(1);}
            50%{transform: scale(1.4);}
            100%{transform: scale(1);}
        }
    </style>
</head>
<body>
    <div class="shikaku" id="shikaku"></div>
    <div class="shikaku2" id="shikaku2"></div>
    <div id="area"></div>
    <script>
        const shi = document.getElementById("shikaku");
        const area = document.getElementById("area");
        shi.innerText = "お使いのデバイスはウイルスに感染しました\n対処方法をクリックして確認してください";
        const shi2 = document.getElementById("shikaku2");

        // shikakuを押したときの挙動

        shi.onclick = ()=>{
            alert("今すぐシャットダウンをしてください");
            shi.style.display ="none";
            for(let i = 1; i <= 3; i++){
                console.log("デバイスが再起不能状態になります")
            }
            area.innerText = "再起不能になるまであと30秒"
            setTimeout(() => {
                area.innerHTML = "<h1>ファイルが消されています</h1>";
                area.innerHTML += "<h1>個人情報が抜き取られています</h1>";
                area.innerHTML += "<h1>下の方の対処方法のところをクリックしてください</h1>";

                shi2.style.display = "flex";
                shi2.innerText = "対処方法";   
            }, 3000);
        };
            // shikaku2の挙動
            shi2.onclick = ()=>{
                shi2.innerText = "請求額は100万円です。支払い方法は銀行振込のみです。払いますか？";
                area.innerHTML = `
                    <div style="
                        position: absolute;
                        top: 800px;
                        left: 50px;
                        display: flex;
                        flex-direction: column;
                        gap: 10px;
                    ">
                    
                        <input type="text" id="user-answer"
                            style="width: 500px; font-size: 30px;" 
                            placeholder="払いますか？はいかyesで答えてください">
                            
                        <button id="check-btn"
                        style="font-size: 30px; cursor: pointer;">送信</button>
                    </div>
                `;
                document.getElementById("check-btn").onclick = ()=>{
                    const answer = document.getElementById("user-answer").value;
                    if (answer === "はい"){
                        alert("誠にありがとうございました。")
                        document.body.style.backgroundColor = "blue";
                    }　else if (answer === "yes"){
                        alert("thank you very much.")
                    } else{
                        alert("ちゃんと入れてなかったのではいということで。ありがとうございました！")
                    }
                };
            };
    </script>
</body>
</html>
